name: Slop Scan

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  slop-scan:
    name: Verify npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run slop-scan
        uses: ./
        with:
          directory: '.'
          threshold: '500'
          fail-on-suspicious: 'true'
